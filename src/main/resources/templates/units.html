<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESQ — Units Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        .units-container {
            padding: 20px;
            height: calc(100vh - 80px);
            overflow-y: auto;
        }

        .units-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .units-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            color: #00f0ff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .units-summary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: linear-gradient(135deg, rgba(20,30,40,0.9) 0%, rgba(10,15,20,0.95) 100%);
            border: 1px solid rgba(0,240,255,0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .summary-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }

        .summary-card.total::before { background: linear-gradient(90deg, #00f0ff, #00aaff); }
        .summary-card.available::before { background: linear-gradient(90deg, #00ff88, #00cc66); }
        .summary-card.busy::before { background: linear-gradient(90deg, #ffaa00, #ff6600); }
        .summary-card.standby::before { background: linear-gradient(90deg, #8888ff, #6666cc); }

        .summary-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .summary-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            margin-bottom: 5px;
        }

        .summary-card.total .summary-value { color: #00f0ff; }
        .summary-card.available .summary-value { color: #00ff88; }
        .summary-card.busy .summary-value { color: #ffaa00; }
        .summary-card.standby .summary-value { color: #8888ff; }

        .summary-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px;
            color: #666;
            text-transform: uppercase;
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-tab {
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(0,240,255,0.2);
            border-radius: 6px;
            color: #888;
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-tab:hover, .filter-tab.active {
            background: rgba(0,240,255,0.1);
            border-color: #00f0ff;
            color: #00f0ff;
        }

        .units-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }

        .unit-card {
            background: linear-gradient(180deg, rgba(20,30,40,0.9) 0%, rgba(10,15,20,0.95) 100%);
            border: 1px solid rgba(0,240,255,0.2);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .unit-card:hover {
            border-color: rgba(0,240,255,0.5);
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(0,240,255,0.15);
        }

        .unit-card.available { border-left: 4px solid #00ff88; }
        .unit-card.busy { border-left: 4px solid #ffaa00; }
        .unit-card.standby { border-left: 4px solid #8888ff; }

        .unit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .unit-code {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .unit-icon {
            font-size: 28px;
        }

        .unit-status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-available {
            background: rgba(0,255,136,0.2);
            color: #00ff88;
            border: 1px solid rgba(0,255,136,0.3);
        }

        .status-busy {
            background: rgba(255,170,0,0.2);
            color: #ffaa00;
            border: 1px solid rgba(255,170,0,0.3);
        }

        .status-standby {
            background: rgba(136,136,255,0.2);
            color: #8888ff;
            border: 1px solid rgba(136,136,255,0.3);
        }

        .unit-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }

        .detail-box {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 12px;
        }

        .detail-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .detail-value {
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            color: #fff;
        }

        .patient-info {
            background: rgba(255,170,0,0.1);
            border: 1px solid rgba(255,170,0,0.2);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .patient-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .patient-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            color: #ffaa00;
        }

        .patient-condition {
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px;
            color: #888;
        }

        .patient-vitals {
            display: flex;
            gap: 15px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            color: #666;
        }

        .vital-item span {
            color: #00f0ff;
        }

        .dispatcher-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(0,240,255,0.05);
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .dispatcher-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00f0ff, #0066ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            color: #fff;
        }

        .dispatcher-details {
            flex: 1;
        }

        .dispatcher-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            color: #fff;
        }

        .dispatcher-role {
            font-family: 'Rajdhani', sans-serif;
            font-size: 11px;
            color: #666;
        }

        .unit-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid;
        }

        .action-btn.primary {
            background: rgba(0,240,255,0.2);
            border-color: rgba(0,240,255,0.3);
            color: #00f0ff;
        }

        .action-btn.secondary {
            background: rgba(0,0,0,0.3);
            border-color: rgba(255,255,255,0.2);
            color: #888;
        }

        .action-btn:hover {
            transform: translateY(-2px);
        }

        .action-btn.primary:hover {
            background: rgba(0,240,255,0.3);
        }

        .action-btn.secondary:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .eta-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            background: rgba(0,255,136,0.1);
            border: 1px solid rgba(0,255,136,0.2);
            border-radius: 4px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            color: #00ff88;
        }

        .hospital-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            background: rgba(0,240,255,0.1);
            border: 1px solid rgba(0,240,255,0.2);
            border-radius: 4px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px;
            color: #00f0ff;
        }

        .no-patient {
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <nav class="vertical-nav">
            <div class="vnav-brand"><div class="vbrand-icon">R</div></div>
            <div class="vnav-items">
                <a href="/dashboard" class="vnav-btn" title="Command Map"><span class="vnav-icon">🗺️</span></a>
                <a href="/units" class="vnav-btn active" title="Units"><span class="vnav-icon">🚑</span></a>
                <a href="/hospitals" class="vnav-btn" title="Hospitals"><span class="vnav-icon">🏥</span></a>
                <a href="/incidents" class="vnav-btn" title="Incidents"><span class="vnav-icon">🔴</span></a>
                <a href="/analytics" class="vnav-btn" title="Analytics"><span class="vnav-icon">📊</span></a>
                <a href="/settings" class="vnav-btn" title="Settings"><span class="vnav-icon">⚙️</span></a>
            </div>
            <div class="vnav-bottom">
                <button class="vnav-btn logout-vbtn" id="vLogoutBtn" title="Logout"><span class="vnav-icon">⏻</span></button>
            </div>
        </nav>

        <div class="main-content">
            <nav class="top-nav">
                <div class="nav-left">
                    <div class="nav-brand">
                        <div class="brand-icon">R</div>
                        <span class="brand-name">RESQ</span>
                    </div>
                    <div class="nav-divider"></div>
                    <span class="nav-subtitle">UNIT MANAGEMENT</span>
                </div>
                <div class="nav-center">
                    <div class="nav-stat">
                        <span class="ns-value" id="navTotal">0</span>
                        <span class="ns-label">TOTAL</span>
                    </div>
                    <div class="nav-stat">
                        <span class="ns-value" id="navAvailable">0</span>
                        <span class="ns-label">AVAILABLE</span>
                    </div>
                    <div class="nav-stat">
                        <span class="ns-value" id="navBusy">0</span>
                        <span class="ns-label">BUSY</span>
                    </div>
                </div>
                <div class="nav-right">
                    <div class="nav-clock" id="navClock">00:00:00</div>
                    <div class="nav-user">
                        <span class="user-role">ADMIN</span>
                        <span class="user-name" id="userName">admin</span>
                    </div>
                    <div class="nav-avatar">A</div>
                    <button class="logout-btn" id="logoutBtn">⏻ LOGOUT</button>
                </div>
            </nav>

            <div class="units-container">
                <div class="units-header">
                    <h1 class="units-title">Ambulance Units</h1>
                </div>

                <div class="units-summary">
                    <div class="summary-card total">
                        <div class="summary-icon">🚑</div>
                        <div class="summary-value" id="summaryTotal">0</div>
                        <div class="summary-label">Total Units</div>
                    </div>
                    <div class="summary-card available">
                        <div class="summary-icon">✅</div>
                        <div class="summary-value" id="summaryAvailable">0</div>
                        <div class="summary-label">Available</div>
                    </div>
                    <div class="summary-card busy">
                        <div class="summary-icon">🚨</div>
                        <div class="summary-value" id="summaryBusy">0</div>
                        <div class="summary-label">Busy / Deployed</div>
                    </div>
                    <div class="summary-card standby">
                        <div class="summary-icon">⏸️</div>
                        <div class="summary-value" id="summaryStandby">0</div>
                        <div class="summary-label">Standby</div>
                    </div>
                </div>

                <div class="filter-tabs">
                    <button class="filter-tab active" data-filter="all">ALL UNITS</button>
                    <button class="filter-tab" data-filter="available">AVAILABLE</button>
                    <button class="filter-tab" data-filter="busy">BUSY / DEPLOYED</button>
                    <button class="filter-tab" data-filter="standby">STANDBY</button>
                </div>

                <div class="units-grid" id="unitsGrid"></div>
            </div>
        </div>
    </div>

    <script>
        let unitsData = [];

        function updateClock() {
            const now = new Date();
            document.getElementById('navClock').textContent = now.toLocaleTimeString('en-US', {hour12: false});
        }
        setInterval(updateClock, 1000);
        updateClock();

        function loadUnits() {
            fetch('/api/ambulances')
                .then(res => res.json())
                .then(data => {
                    unitsData = data;
                    renderUnits(data);
                    updateSummary(data);
                })
                .catch(err => {
                    console.error('Error loading units:', err);
                    loadSampleUnits();
                });
        }

        function loadSampleUnits() {
            unitsData = [
                { id: 1, unitCode: 'AMB-001', status: 'AVAILABLE', lat: 28.6139, lng: 77.2090, dispatcherName: 'Dispatcher 1', dispatcherId: 1 },
                { id: 2, unitCode: 'AMB-002', status: 'DEPLOYED', lat: 28.6500, lng: 77.2500, dispatcherName: 'Dispatcher 2', dispatcherId: 2, currentPatientName: 'Rajesh Kumar', patientCondition: 'Chest Pain', destinationHospital: 'City General Hospital', etaMinutes: 8, vitals: { hr: '110', bp: '150/95' } },
                { id: 3, unitCode: 'AMB-003', status: 'DEPLOYED', lat: 28.5800, lng: 77.2800, dispatcherName: 'Dispatcher 3', dispatcherId: 3, currentPatientName: 'Priya Sharma', patientCondition: 'Accident Injury', destinationHospital: 'Emergency Plus Hospital', etaMinutes: 12, vitals: { hr: '95', bp: '100/70' } },
                { id: 4, unitCode: 'AMB-004', status: 'STANDBY', lat: 28.6300, lng: 77.2200, dispatcherName: 'Unassigned', dispatcherId: null },
                { id: 5, unitCode: 'AMB-005', status: 'AVAILABLE', lat: 28.5900, lng: 77.2000, dispatcherName: 'Dispatcher 1', dispatcherId: 1 }
            ];
            renderUnits(unitsData);
            updateSummary(unitsData);
        }

        function getStatusClass(status) {
            if (status === 'AVAILABLE') return 'available';
            if (status === 'DEPLOYED' || status === 'BUSY') return 'busy';
            return 'standby';
        }

        function getStatusBadge(status) {
            if (status === 'AVAILABLE') return '<span class="unit-status-badge status-available">AVAILABLE</span>';
            if (status === 'DEPLOYED' || status === 'BUSY') return '<span class="unit-status-badge status-busy">DEPLOYED</span>';
            return '<span class="unit-status-badge status-standby">STANDBY</span>';
        }

        function renderUnits(data) {
            const grid = document.getElementById('unitsGrid');
            grid.innerHTML = data.map(unit => `
                <div class="unit-card ${getStatusClass(unit.status)}">
                    <div class="unit-header">
                        <div class="unit-code">
                            <span class="unit-icon">🚑</span>
                            ${unit.unitCode || 'AMB-' + String(unit.id).padStart(3, '0')}
                        </div>
                        ${getStatusBadge(unit.status)}
                    </div>

                    <div class="dispatcher-info">
                        <div class="dispatcher-avatar">${unit.dispatcherName ? unit.dispatcherName.charAt(0) : '?'}</div>
                        <div class="dispatcher-details">
                            <div class="dispatcher-name">${unit.dispatcherName || 'Unassigned'}</div>
                            <div class="dispatcher-role">${unit.dispatcherId ? 'Assigned Dispatcher' : 'No Dispatcher'}</div>
                        </div>
                    </div>

                    ${unit.status === 'DEPLOYED' || unit.status === 'BUSY' ? `
                        <div class="patient-info">
                            <div class="patient-header">
                                <span class="patient-name">🚨 ${unit.currentPatientName || 'Patient'}</span>
                                ${unit.etaMinutes ? `<span class="eta-badge">⏱️ ETA: ${unit.etaMinutes} min</span>` : ''}
                            </div>
                            <div class="patient-condition">${unit.patientCondition || 'Medical Emergency'}</div>
                            <div class="patient-vitals">
                                ${unit.vitals?.hr ? `<span class="vital-item">❤️ <span>${unit.vitals.hr}</span> bpm</span>` : ''}
                                ${unit.vitals?.bp ? `<span class="vital-item">💉 <span>${unit.vitals.bp}</span></span>` : ''}
                            </div>
                            ${unit.destinationHospital ? `<div class="hospital-badge" style="margin-top: 10px;">🏥 ${unit.destinationHospital}</div>` : ''}
                        </div>
                    ` : `
                        <div class="patient-info" style="background: rgba(0,255,136,0.05); border-color: rgba(0,255,136,0.1);">
                            <span class="no-patient">✅ Ready for dispatch - No active assignment</span>
                        </div>
                    `}

                    <div class="unit-details">
                        <div class="detail-box">
                            <div class="detail-label">Location</div>
                            <div class="detail-value">${unit.lat?.toFixed(4) || 'N/A'}, ${unit.lng?.toFixed(4) || 'N/A'}</div>
                        </div>
                        <div class="detail-box">
                            <div class="detail-label">Last Update</div>
                            <div class="detail-value">Just now</div>
                        </div>
                    </div>

                    <div class="unit-actions">
                        <button class="action-btn primary" onclick="trackUnit('${unit.unitCode}')">📍 TRACK</button>
                    </div>
                </div>
            `).join('');
        }

        function updateSummary(data) {
            const total = data.length;
            const available = data.filter(u => u.status === 'AVAILABLE').length;
            const busy = data.filter(u => u.status === 'DEPLOYED' || u.status === 'BUSY').length;
            const standby = data.filter(u => u.status === 'STANDBY').length;

            document.getElementById('summaryTotal').textContent = total;
            document.getElementById('summaryAvailable').textContent = available;
            document.getElementById('summaryBusy').textContent = busy;
            document.getElementById('summaryStandby').textContent = standby;
            document.getElementById('navTotal').textContent = total;
            document.getElementById('navAvailable').textContent = available;
            document.getElementById('navBusy').textContent = busy;
        }

        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                const filter = this.dataset.filter;
                const filtered = filter === 'all' ? unitsData : 
                    filter === 'available' ? unitsData.filter(u => u.status === 'AVAILABLE') :
                    filter === 'busy' ? unitsData.filter(u => u.status === 'DEPLOYED' || u.status === 'BUSY') :
                    unitsData.filter(u => u.status === 'STANDBY');
                renderUnits(filtered);
            });
        });

        function trackUnit(unitCode) {
            alert('Tracking unit: ' + unitCode);
        }

        function dispatchUnit(unitCode) {
            alert('Dispatch panel for: ' + unitCode);
        }

        document.getElementById('vLogoutBtn').addEventListener('click', () => {
            document.getElementById('logoutBtn').click();
        });

        loadUnits();
    </script>
</body>
</html>
